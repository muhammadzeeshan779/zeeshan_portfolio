<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<script>
const cards = document.querySelectorAll(".card-soft");

window.addEventListener("scroll",()=>{
cards.forEach(card=>{
const top = card.getBoundingClientRect().top;

if(top < window.innerHeight - 80){
card.classList.add("show");
}
});
});
</script>
<body>

<header><h1>Contact Me</h1></header>

<nav class="navbar navbar-expand-lg my-3 container">

          type="button"

      <a class="nav-link" href="cv.html">CV</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </div>
  </div>
</nav>

<div class="card-soft container">

<form action="https://formsubmit.co/zeenicornmoon@gmail.com" method="POST">

<input type="hidden" name="_subject" value="Portfolio Contact">

<div class="mb-3">

<script>
document.addEventListener("DOMContentLoaded", function(){

const cards = document.querySelectorAll(".card-soft");

window.addEventListener("scroll",()=>{
cards.forEach(card=>{
const top = card.getBoundingClientRect().top;

if(top < window.innerHeight - 80){
